name: Debug Network & Logs

on: 
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Debug
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== 1. Docker Containers ==="
            docker ps -a --format "table {{.ID}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"
            
            echo -e "\n=== 2. Port Usage (80, 8080, 5432) ==="
            netstat -tulpn | grep -E ':(80|8080|5432)' || echo "Ports free"
            
            echo -e "\n=== 3. Backend Logs (Error only) ==="
            docker logs cloud-bridge-backend 2>&1 | grep -i "error" | tail -n 20
            
            echo -e "\n=== 4. Frontend Nginx Logs ==="
            docker logs cloud-bridge-frontend --tail 20
            
            echo -e "\n=== 5. Curl Test (Localhost) ==="
            curl -I http://localhost:80 || echo "Curl 80 failed"
            curl -I http://localhost:8080/api/ || echo "Curl 8080 failed"
