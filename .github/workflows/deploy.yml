name: Deploy to Production

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 0. Ensure Environment (Git & Docker)
            if ! command -v git &> /dev/null; then
              echo "Installing Git..."
              if [ -f /etc/redhat-release ]; then
                yum install -y git
              else
                apt-get update && apt-get install -y git
              fi
            fi

            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi

            # 1. Prepare directory
            mkdir -p /opt/cloud-bridge
            cd /opt/cloud-bridge

            # 2. Update code
            # Force git to trust the directory
            git config --global --add safe.directory /opt/cloud-bridge
            
            # If directory exists but is not a git repo, clean it up to allow clone
            if [ -d ".git" ]; then
               echo "Git repo exists, fetching updates..."
               git fetch origin main
               git reset --hard origin/main
            else
               echo "Directory exists but not a git repo (or empty). Cleaning up..."
               # CAUTION: Back up datasets if they exist, then clean
               if [ -d "数据集" ]; then mv "数据集" /tmp/datasets_backup; fi
               
               # Remove all files in current dir to allow clone
               find . -maxdepth 1 -not -name '.' -not -name '..' -exec rm -rf {} +
               
               echo "Cloning fresh repo..."
               git clone https://github.com/Frostsnow35/Cloud-Bridge.git .
               
               # Restore datasets if we backed them up
               if [ -d "/tmp/datasets_backup" ]; then 
                  mv /tmp/datasets_backup "数据集"
               fi
            fi

            # 3. Configure Env
            echo "COMPOSE_PROJECT_NAME=cloud-bridge-prod" > .env
            echo "AI_API_KEY=${{ secrets.AI_API_KEY }}" >> .env
            # Add AI config if needed, default to hardcoded or use secrets
            echo "AI_API_URL=http://36.140.97.212:9004/v1/chat/completions" >> .env
            echo "AI_API_MODEL=Qwen2.5-72B" >> .env
            
            # --- FIREWALL FIX: Ensure internal firewall doesn't block ports ---
            echo "Disabling internal firewall to rely on Security Group..."
            if command -v systemctl &> /dev/null; then
                systemctl stop firewalld 2>/dev/null || true
                systemctl disable firewalld 2>/dev/null || true
                systemctl stop ufw 2>/dev/null || true
                systemctl disable ufw 2>/dev/null || true
            fi
            # ------------------------------------------------------------------
            
            # 4. Build and Start
            docker compose down --remove-orphans
            docker compose up -d --build

            # 5. Cleanup
            docker image prune -f

            # 6. Post-Deploy Health Check
            echo "Waiting for services to initialize (30s)..."
            sleep 30
            
            echo "=== Docker Status ==="
            docker ps -a
            
            echo "=== Port Check ==="
            netstat -tulpn | grep -E ':(80|8080)' || echo "Ports not found in netstat"
            
            echo "=== Local Connectivity Check ==="
            if curl -s -I http://localhost:80 > /dev/null; then
                echo "✅ Frontend is reachable locally on port 80"
            else
                echo "❌ Frontend is NOT reachable locally on port 80"
                echo "Dumping Frontend Logs:"
                docker logs cloud-bridge-frontend --tail 50
            fi
            
            if curl -s -I http://localhost:8080/api/health > /dev/null; then # Assuming /api/health or just check /api/
                 echo "✅ Backend is reachable locally on port 8080"
            else
                 # Backend might 404 on root, but connection should work
                 if curl -s http://localhost:8080 > /dev/null; then
                     echo "⚠️ Backend is reachable but returned error (expected if root path 404)"
                 else
                     echo "❌ Backend is NOT reachable locally on port 8080"
                     echo "Dumping Backend Logs:"
                     docker logs cloud-bridge-backend --tail 50
                 fi
            fi
